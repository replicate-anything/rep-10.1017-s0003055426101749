paper:
  doi: https://doi.org/10.1017/S0003055426101749
  title: "Portraits of Power: Facial Appearance and the Tacit Domain of Political Selection in China"
  journal: American Political Science Review
  year: 2026
  authors: Junyan Jiang, Songpo Yang
  dependencies:
    - haven
    - ggplot2
    - dplyr
    - readr
    - tidytext

maintainer:
  name: Macartan Humphreys
  email: macartan.humphreys@wzb.eu

collections:
  - APSR

repo: replicate-anything/rep-10.1017-s0003055426101749

languages:
  - stata
  - python
  - r

python_dependencies:
  - pandas
  - numpy
  - scikit-learn
  - imbalanced-learn
  - jupyter
  - nbconvert

stata_packages:
  - ftools
  - reghdfe
  - estout
  - require

steps:
  - id: analysis_data
    type: transform
    label: Analysis dataset
    description: Merged person-rank panel (all_asperson_fulldata.dta)
    inputs:
      - data/raw/all_asperson_original.dta
      - data/raw/CPED_2022.dta
    outputs:
      - outputs/analysis_data.dta
    engine: stata
    code: code/steps/analysis_data.do

  - id: run_random_forest
    type: transform
    label: Feature importance scores
    description: Random-forest promotion and purge results (CSV)
    parents:
      - analysis_data
    inputs:
      - outputs/analysis_data.dta
    outputs:
      - outputs/run_random_forest_promotion.csv
      - outputs/run_random_forest_purge.csv
    engine: python
    code: code/steps/run_random_forest.ipynb
    dependencies:
      - pandas
      - numpy
      - scikit-learn
      - imbalanced-learn
      - jupyter
      - nbconvert

  - id: tab_1
    group: tab_1
    type: table
    label: Table 1
    description: Baseline results — promotion and purge
    parents:
      - analysis_data
    engine: stata
    inputs:
      - outputs/analysis_data.dta
    data: outputs/analysis_data.dta
    code: code/tables/tab_1.do
    stata_source: code/tables/mk_tab_1.do
    outputs:
      - outputs/tab_1/tab_1_stata.log
      - outputs/tab_1.html

  - id: tab_1_format
    type: format
    parent: tab_1
    code: code/helpers/format_stata.R

  - id: tab_2
    group: tab_2
    type: table
    label: Table 2
    description: Influence of facial features by promotion steps
    parents:
      - analysis_data
    engine: stata
    data: outputs/analysis_data.dta
    code: code/tables/tab_2.do
    stata_source: code/tables/mk_tab_2.do
    outputs:
      - outputs/tab_2/tab_2_stata.log
      - outputs/tab_2.html

  - id: tab_2_format
    type: format
    parent: tab_2
    code: code/helpers/format_stata.R

  - id: tab_3
    group: tab_3
    type: table
    label: Table 3
    description: Gender-specific marginal effects (pooled interaction model)
    parents:
      - analysis_data
    engine: stata
    data: outputs/analysis_data.dta
    code: code/tables/tab_3.do
    stata_source: code/tables/mk_tab_3.do
    outputs:
      - outputs/tab_3/tab_3_stata.log
      - outputs/tab_3.html

  - id: tab_3_format
    type: format
    parent: tab_3
    code: code/helpers/format_stata.R

  - id: fig_2
    group: fig_2
    type: figure
    label: Figure 2
    description: Human versus machine ratings from 10-fold cross-validation
    engine: python
    inputs:
      - data/raw/10fold_training_results.csv
    data: data/raw/10fold_training_results.csv
    code: code/figures/fig_2.py
    outputs:
      - outputs/fig_2.png
    dependencies:
      - pandas
      - numpy
      - matplotlib
      - seaborn
      - scipy

  - id: fig_4
    group: fig_4
    type: figure
    label: Figure 4
    description: Relative importance of facial appearances in predicting promotion and purge
    parents:
      - run_random_forest
    engine: r
    inputs:
      - outputs/run_random_forest_promotion.csv
      - outputs/run_random_forest_purge.csv
    data:
      - outputs/run_random_forest_promotion.csv
      - outputs/run_random_forest_purge.csv
    code: code/figures/fig_4.R
    format: format_fig_4
    outputs:
      - outputs/fig_4.png
    dependencies:
      - ggplot2
      - dplyr
      - readr
      - tidytext

  - id: fig_4_format
    type: format
    parent: fig_4
    format: format_fig_4

  - id: fig_5
    group: fig_5
    type: figure
    label: Figure 5
    description: Conjoint experiment results on individual selection preferences
    engine: r
    inputs:
      - data/raw/attractiveness.csv
      - data/raw/trustworthiness.csv
      - data/raw/competence.csv
      - data/raw/aggressiveness.csv
    data:
      - data/raw/attractiveness.csv
      - data/raw/trustworthiness.csv
      - data/raw/competence.csv
      - data/raw/aggressiveness.csv
    code: code/figures/fig_5.R
    format: format_fig_5
    outputs:
      - outputs/fig_5.png
    dependencies:
      - ggplot2
      - dplyr
      - readr

  - id: fig_5_format
    type: format
    parent: fig_5
    format: format_fig_5
